<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BreezeCast</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .bg-gif {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.38);
      z-index: 1;
    }

    .hero {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .title-link {
      text-decoration: none;
    }

    .title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 500;
      font-size: clamp(4rem, 13vw, 10rem);
      color: #00e5ff;
      display: inline-block;
      transform: skewX(-10deg);
      letter-spacing: 0.02em;
      line-height: 1;
      text-shadow:
        0 0 50px rgba(0, 229, 255, 0.5),
        0 0 110px rgba(0, 229, 255, 0.2);
      transition: color 0.2s ease, text-shadow 0.2s ease;
    }

    .title-link:hover .title {
      color: #ffffff;
      text-shadow:
        0 0 60px rgba(0, 229, 255, 0.9),
        0 0 130px rgba(0, 229, 255, 0.5);
    }

    .scanlines {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 3px,
        rgba(0, 0, 0, 0.07) 3px,
        rgba(0, 0, 0, 0.07) 4px
      );
    }
  </style>
</head>
<body>
  <img class="bg-gif" src="anim_lp.gif" alt="">
  <div class="overlay"></div>
  <div class="scanlines"></div>

  <div class="hero">
    <a class="title-link" href="cities.html">
      <div class="title">BreezeCast</div>
    </a>
  </div>
</body>
</html>
