<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breezecast – Ottawa</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(160deg, #0f172a 0%, #0c2a4a 60%, #1e3a5f 100%);
      min-height: 100vh;
      color: white;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 16px 56px;
    }

    /* ── Header ─────────────────────────────────────── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .location-name {
      font-size: clamp(13px, 2.5vw, 17px);
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.4px;
      margin-bottom: 4px;
    }
    .current-temp {
      font-size: clamp(64px, 14vw, 96px);
      font-weight: 200;
      line-height: 1;
      letter-spacing: -3px;
    }
    .current-feels {
      margin-top: 6px;
      font-size: 14px;
      color: rgba(255,255,255,0.45);
    }
    .header-right { text-align: right; }
    .updated {
      font-size: 11px;
      color: rgba(255,255,255,0.28);
      margin-top: 8px;
    }

    /* ── Section labels ──────────────────────────────── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: rgba(255,255,255,0.38);
      margin-bottom: 12px;
      padding-left: 2px;
    }

    /* ── 7-Day cards ─────────────────────────────────── */
    .days-section { margin-bottom: 36px; }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }

    @media (max-width: 720px) {
      .days-grid {
        display: flex;
        overflow-x: auto;
        gap: 10px;
        padding-bottom: 8px;
        scroll-snap-type: x mandatory;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .days-grid::-webkit-scrollbar { display: none; }
    }

    .day-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 16px 10px 14px;
      text-align: center;
      backdrop-filter: blur(8px);
      transition: background 0.2s, transform 0.18s;
      min-width: 120px;
      scroll-snap-align: start;
    }
    .day-card:hover {
      background: rgba(255,255,255,0.13);
      transform: translateY(-3px);
    }
    .day-card.today {
      background: rgba(96,165,250,0.17);
      border-color: rgba(96,165,250,0.38);
    }
    .day-name {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .day-card.today .day-name { color: #60a5fa; }
    .day-date {
      font-size: 11px;
      color: rgba(255,255,255,0.28);
      margin-top: 2px;
      margin-bottom: 8px;
    }
    .day-icon {
      font-size: 28px;
      line-height: 1;
      margin: 4px 0 8px;
    }
    .day-temps {
      display: flex;
      justify-content: center;
      gap: 10px;
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .t-high { color: #fb923c; }
    .t-low  { color: #60a5fa; }
    .day-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.09);
      margin-bottom: 8px;
    }
    .day-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .meta-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      padding: 0 2px;
    }
    .ml { color: rgba(255,255,255,0.33); }
    .mv { color: rgba(255,255,255,0.72); font-weight: 500; }

    /* ── Charts ──────────────────────────────────────── */
    .chart-section { margin-bottom: 28px; }

    .chart-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px;
      overflow: hidden;
    }
    .chart-scroll {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
    }
    .chart-scroll::-webkit-scrollbar {
      height: 4px;
    }
    .chart-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .chart-scroll::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
    }
    .chart-div {
      width: 100%;
      height: 420px;
    }
    @media (max-width: 600px) {
      .chart-div {
        height: 320px;
        min-width: 700px;
        width: 700px;
      }
    }

    /* ── Footer ──────────────────────────────────────── */
    .footer {
      text-align: center;
      color: rgba(255,255,255,0.18);
      font-size: 11px;
      margin-top: 36px;
      letter-spacing: 0.3px;
    }
  </style>
</head>

// ── Render day cards ──────────────────────────────────────
function renderCards() {
  const container = document.getElementById('dayCards');
  DAILY.forEach((d, i) => {
    const isToday = i === 0;
    const card = document.createElement('div');
    card.className = 'day-card' + (isToday ? ' today' : '');

    const feelsRow = d.feels_low !== null
      ? `<div class="meta-row"><span class="ml">Feels</span><span class="mv">${d.feels_low}°</span></div>`
      : '';
    const snowRow = d.snow > 0
      ? `<div class="meta-row"><span class="ml">Snow</span><span class="mv">${d.snow} cm</span></div>`
      : '';

    card.innerHTML = `
      <div class="day-name">${isToday ? 'Today' : d.day}</div>
      <div class="day-date">${d.date}</div>
      <div class="day-icon">${d.icon}</div>
      <div class="day-temps">
        <span class="t-high">${d.high !== null ? d.high + '°' : '--'}</span>
        <span class="t-low"> ${d.low  !== null ? d.low  + '°' : '--'}</span>
      </div>
      <hr class="day-divider">
      <div class="day-meta">
        ${feelsRow}
        <div class="meta-row"><span class="ml">Rain</span><span class="mv">${d.precip} mm</span></div>
        ${snowRow}
      </div>
    `;
    container.appendChild(card);
  });
}

// ── Dark theme for Plotly layouts ─────────────────────────
function applyDarkTheme(layout) {
  layout.paper_bgcolor = 'rgba(0,0,0,0)';
  layout.plot_bgcolor  = 'rgba(0,0,0,0)';
  layout.font = Object.assign(layout.font || {}, {
    color:  'rgba(255,255,255,0.72)',
    family: '-apple-system, BlinkMacSystemFont, system-ui, sans-serif',
  });
  ['xaxis', 'yaxis'].forEach(ax => {
    if (!layout[ax]) return;
    layout[ax].gridcolor     = 'rgba(255,255,255,0.07)';
    layout[ax].linecolor     = 'rgba(255,255,255,0.15)';
    layout[ax].zerolinecolor = 'rgba(255,255,255,0.12)';
    layout[ax].tickfont      = Object.assign(layout[ax].tickfont || {}, { color: 'rgba(255,255,255,0.55)' });
  });
  if (layout.legend) {
    layout.legend.bgcolor     = 'rgba(0,0,0,0)';
    layout.legend.bordercolor = 'rgba(255,255,255,0.12)';
  }
  if (layout.updatemenus) {
    layout.updatemenus.forEach(m => {
      m.bgcolor     = 'rgba(15,23,42,0.92)';
      m.bordercolor = 'rgba(255,255,255,0.2)';
      m.font        = Object.assign(m.font || {}, { color: 'white' });
    });
  }
  return layout;
}

// ── Render Plotly charts ──────────────────────────────────
function renderCharts() {
  const cfg = { responsive: true, displayModeBar: false };
  Plotly.newPlot('short-chart', SHORT.data, applyDarkTheme(SHORT.layout), cfg);
  Plotly.newPlot('long-chart',  LONG.data,  applyDarkTheme(LONG.layout),  cfg);
}

// ── Init ──────────────────────────────────────────────────
renderCards();
renderCharts();
</script>
